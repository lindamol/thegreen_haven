{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Haven</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'greenhaven/css/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="top-bar">
        <span>CANADA-WIDE SHIPPING WITH UPS</span>
    </div>

    <header class="main-header">
        <a href="{% url 'home' %}" class="logo">green<span>haven</span></a>

        <form action="{% url 'search_plants' %}" method="GET" class="search-form">
            <input type="text" name="q" placeholder="Search plants..." class="search-input">
            <button type="submit" class="search-btn">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </form>

        <nav class="main-nav">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'houseplants' %}">Houseplants</a>
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Register</a>
        </nav>

        <div class="header-right">
            <a href="{% url 'cart' %}" class="cart-link">
                <i class="fa-solid fa-cart-shopping"></i>
            </a>
        </div>
    </header>

    {% block content %}{% endblock %}

</body>
</html>
